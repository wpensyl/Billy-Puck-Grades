<!DOCTYPE html>
<html>
<head><title>Billy Puck Grades — API Diagnostic v2</title>
<style>
body{font-family:monospace;background:#0d0f14;color:#e8eaf0;padding:2rem;max-width:700px;}
h2{color:#2dd4a0;margin-bottom:1.5rem;}
.ok{color:#2dd4a0;}.fail{color:#f4624a;}.info{color:#5b9cf6;}
pre{background:#1c1f28;padding:.5rem .75rem;border-radius:4px;font-size:.78rem;
    white-space:pre-wrap;word-break:break-all;margin:.25rem 0 .75rem;}
p{margin:.25rem 0;}
</style>
</head>
<body>
<h2>Billy Puck Grades — API Diagnostic v2</h2>
<div id="out"></div>
<script>
const out = document.getElementById('out');
function log(msg, cls='') { const p = document.createElement('p'); p.className=cls; p.textContent=msg; out.appendChild(p); }
function pre(msg) { const p = document.createElement('pre'); p.textContent=msg; out.appendChild(p); }

async function test(label, url) {
  log(`Testing: ${label}`, 'info');
  try {
    const r = await fetch(url);
    log(`  HTTP status: ${r.status} ${r.statusText}`, r.ok ? 'ok' : 'fail');
    const text = await r.text();
    pre(text.slice(0, 400));
    return r.ok;
  } catch(e) {
    log(`  Network error: ${e.message}`, 'fail');
    return false;
  }
}

async function run() {
  log(`Origin: ${window.location.origin}`);
  log('');

  log('--- Test 1: /nhl-api function (simple query param) ---', 'info');
  await test('GET /nhl-api?path=/v1/roster/EDM/current', '/nhl-api?path=/v1/roster/EDM/current');

  log('');
  log('--- Test 2: Player landing via proxy ---', 'info');
  await test('GET /nhl-api?path=/v1/player/8478402/landing', '/nhl-api?path=/v1/player/8478402/landing');

  log('');
  log('--- Test 3: Headshot CDN ---', 'info');
  const img = new Image();
  await new Promise(r => {
    img.onload = () => { log('  Headshot OK', 'ok'); r(); };
    img.onerror = () => { log('  Headshot FAIL', 'fail'); r(); };
    img.src = 'https://assets.nhle.com/mugs/nhl/20252026/8478402.png';
    setTimeout(r, 5000);
  });

  log('');
  log('Done.', 'ok');
}
run();
</script>
</body>
</html>
